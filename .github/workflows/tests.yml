name: QA Automation Tests (Python)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run API tests
        env:
          API_URL: ${{ secrets.API_URL || 'https://api.demoblaze.com' }}
        run: pytest tests/api -n auto
      - name: Generate Allure report
        if: always()
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure-2.29.0.tgz
          ./allure-2.29.0/bin/allure generate allure-results --clean -o allure-report-api
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-api
          path: allure-report-api/
          retention-days: 30

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Install Playwright browsers
        run: playwright install chromium --with-deps
      - name: Run UI tests
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://www.demoblaze.com' }}
          API_URL: ${{ secrets.API_URL || 'https://api.demoblaze.com' }}
        run: pytest tests/ui
      - name: Generate Allure report
        if: always()
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -xzf allure-2.29.0.tgz
          ./allure-2.29.0/bin/allure generate allure-results --clean -o allure-report-ui
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-ui
          path: allure-report-ui/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always()
    steps:
      - name: Send Telegram notification
        run: |
          API_STATUS="${{ needs.api-tests.result }}"
          UI_STATUS="${{ needs.ui-tests.result }}"

          if [ "$API_STATUS" = "success" ] && [ "$UI_STATUS" = "success" ]; then
            EMOJI="✅"; LABEL="PASSED"
          else
            EMOJI="❌"; LABEL="FAILED"
          fi

          MESSAGE="${EMOJI} *QA Tests (Python) — ${LABEL}*

          📋 *Run:* \`#${{ github.run_number }}\`
          🌿 *Branch:* \`${{ github.ref_name }}\`
          👤 *Triggered by:* ${{ github.actor }}

          📊 *Results:*
          • API Tests: ${{ needs.api-tests.result == 'success' && '✅ passed' || '❌ failed' }}
          • UI Tests: ${{ needs.ui-tests.result == 'success' && '✅ passed' || '❌ failed' }}

          🔗 [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="${MESSAGE}"
